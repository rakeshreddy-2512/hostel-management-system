{% extends 'base.html' %}
{% block content %}
<h2>Rooms</h2>
<form method="post"><input name="room_number" placeholder="Room Number" required><input name="capacity" type="number" min="1" placeholder="Capacity" required><button>Add Room</button></form>
<table><tr><th>Room</th><th>Capacity</th><th>Occupied</th></tr>
{% for r in rooms %}<tr><td>{{ r.room_number }}</td><td>{{ r.capacity }}</td><td>{{ r.occupied }}</td></tr>{% endfor %}
</table>
{% endblock %}
